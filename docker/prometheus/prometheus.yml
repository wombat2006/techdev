# TechSapo Prometheus Configuration
# 壁打ち分析システム専用監視設定

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'techsapo-production'
    region: 'asia-northeast1'

# Rule files specifies a list of globs for rule files
rule_files:
  - "alert_rules.yml"
  - "recording_rules.yml"

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

# Scrape configurations
scrape_configs:
  # TechSapo Wall-Bounce Application
  - job_name: 'techsapo-wallbounce'
    scrape_interval: 15s
    scrape_timeout: 10s
    metrics_path: /metrics
    static_configs:
      - targets: ['techsapo-app:4000']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'techsapo-wallbounce-main'

  # Node Exporter (System metrics)
  - job_name: 'node-exporter'
    scrape_interval: 30s
    static_configs:
      - targets: ['node-exporter:9100']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'techsapo-host-01'

  # Redis Exporter
  - job_name: 'redis-exporter'
    scrape_interval: 30s
    static_configs:
      - targets: ['redis-exporter:9121']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'techsapo-redis-cache'

  # MySQL Exporter
  - job_name: 'mysql-exporter'
    scrape_interval: 30s
    static_configs:
      - targets: ['mysql-exporter:9104']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'techsapo-mysql-db'

  # Nginx Exporter
  - job_name: 'nginx-exporter'
    scrape_interval: 30s
    static_configs:
      - targets: ['nginx-exporter:9113']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'techsapo-nginx-proxy'

  # Docker container metrics via cAdvisor
  - job_name: 'cadvisor'
    scrape_interval: 30s
    static_configs:
      - targets: ['cadvisor:8080']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'techsapo-containers'

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    scrape_interval: 30s
    static_configs:
      - targets: ['localhost:9090']
    
  # Grafana monitoring
  - job_name: 'grafana'
    scrape_interval: 60s
    static_configs:
      - targets: ['grafana:3000']
    metrics_path: /metrics

# Storage configuration
storage:
  tsdb:
    path: /prometheus/data
    retention.time: 15d
    retention.size: 10GB
    wal-compression: true

